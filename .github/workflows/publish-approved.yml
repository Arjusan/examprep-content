name: Publish Approved Questions to Live

on:
  workflow_dispatch:
    inputs:
      exam:
        description: 'Exam to publish (si/icds/panchayat/tet)'
        required: true
        default: 'si'
      date:
        description: 'Date to publish (YYYY-MM-DD, leave blank for today)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Publish staging to live
        env:
          TARGET_EXAM: ${{ github.event.inputs.exam }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: node .github/scripts/publish.js

      - name: Commit published files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "ExamPrep Bot"
          git add live/
          git diff --staged --quiet || git commit -m "✅ Publish approved questions — ${{ github.event.inputs.exam }} $(date -u '+%Y-%m-%d')"
          git push
